<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>辽宁省大数据管理与优化决策重点实验室</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f4;
      --ink: #17212b;
      --muted: #5b6672;
      --line: #d8ddd5;
      --panel: #ffffff;
      --panel-2: #eef3f0;
      --teal: #0f766e;
      --teal-soft: #d9efeb;
      --coral: #bf4b3c;
      --amber: #b7791f;
      --blue: #2f5f98;
    --shadow: 0 18px 36px rgba(25, 34, 42, 0.08);
    --shadow-strong: 0 22px 42px rgba(15, 48, 45, 0.14);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 6px;
      min-height: 36px;
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover {
      border-color: #9bb0aa;
      background: #f9fbfa;
    }

    button.primary {
      background: var(--teal);
      border-color: var(--teal);
      color: white;
    }

    button.icon {
      width: 36px;
      padding: 0;
      display: inline-grid;
      place-items: center;
      font-size: 19px;
      line-height: 1;
    }

    button.tab {
      border: 0;
      border-radius: 0;
      background: transparent;
      border-bottom: 3px solid transparent;
      color: var(--muted);
      min-height: 42px;
      padding: 0 14px;
    }

    button.tab[aria-selected="true"] {
      color: var(--ink);
      border-bottom-color: var(--teal);
      background: var(--teal-soft);
    }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      border-bottom: 1px solid #c9d8d3;
      background: linear-gradient(135deg, #ffffff 0%, #edf6f3 54%, #f7f1e7 100%);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-inner {
      width: min(1440px, calc(100vw - 32px));
      margin: 0 auto;
      min-height: 86px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .brand-mark {
      width: 48px;
      height: 48px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--teal);
      color: #ffffff;
      font-size: 22px;
      font-weight: 800;
      box-shadow: var(--shadow-strong);
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 24px;
      line-height: 1.15;
      font-weight: 760;
      letter-spacing: 0;
    }

    .lab-name {
      color: #113f3b;
      font-size: clamp(18px, 2vw, 26px);
      font-weight: 760;
      line-height: 1.18;
      letter-spacing: 0;
    }

    .brand-caption {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .toolbar {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      flex-wrap: wrap;
    }

    .threshold {
      display: grid;
      grid-template-columns: auto 160px 46px;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 0 10px;
      border: 1px solid var(--line);
      background: var(--panel);
      border-radius: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    input[type="range"] {
      accent-color: var(--teal);
    }

    .workspace {
      width: min(1440px, calc(100vw - 32px));
      margin: 20px auto 28px;
      display: grid;
      grid-template-columns: minmax(420px, 1.05fr) minmax(420px, 0.95fr);
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      min-width: 0;
      overflow: hidden;
    }

    .panel-head {
      min-height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #f7faf8 0%, var(--panel-2) 100%);
    }

    .panel-title {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    h2 {
      margin: 0;
      font-size: 16px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .panel-actions {
      display: flex;
      gap: 6px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .setup {
      border-bottom: 1px solid var(--line);
      padding: 14px;
      background: #fbfcfb;
      display: grid;
      gap: 12px;
    }

    .setup-row {
      display: grid;
      grid-template-columns: auto minmax(92px, 120px) 1fr;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    .size-input {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      color: var(--ink);
      background: var(--panel);
      font-variant-numeric: tabular-nums;
    }

    .task-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 8px;
    }

    .task-field {
      display: grid;
      grid-template-columns: 34px 1fr;
      align-items: center;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      overflow: hidden;
    }

    .task-index {
      height: 100%;
      display: grid;
      place-items: center;
      border-right: 1px solid var(--line);
      background: var(--panel-2);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .task-field input {
      width: 100%;
      min-width: 0;
      height: 36px;
      border: 0;
      padding: 0 10px;
      color: var(--ink);
      background: transparent;
    }

    .matrix-wrap {
      overflow: auto;
      max-height: calc(100vh - 180px);
    }

    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    .matrix-table {
      min-width: 560px;
    }

    th,
    td {
      border-right: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      text-align: center;
      min-width: 86px;
    }

    th {
      background: #fbfcfb;
      color: var(--muted);
      font-weight: 650;
      height: 44px;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    th:first-child {
      left: 0;
      z-index: 3;
    }

    td.row-label,
    th.corner {
      position: sticky;
      left: 0;
      background: #fbfcfb;
      z-index: 1;
    }

    th input,
    td.row-label input {
      width: 100%;
      height: 43px;
      border: 0;
      background: transparent;
      color: var(--ink);
      text-align: center;
      font-weight: 650;
      padding: 0 8px;
    }

    .label-display {
      display: block;
      padding: 0 8px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cell {
      width: 100%;
      height: 48px;
      border: 0;
      text-align: center;
      color: var(--ink);
      background: transparent;
      padding: 0 8px;
      outline: none;
      font-variant-numeric: tabular-nums;
    }

    .cell:focus,
    th input:focus,
    td.row-label input:focus,
    .task-field input:focus,
    .size-input:focus,
    textarea:focus,
    .csv-input:focus {
      outline: 2px solid rgba(15, 118, 110, 0.3);
      outline-offset: -2px;
    }

    td.diagonal {
      background: #ecefeb;
      color: var(--muted);
      font-weight: 700;
    }

    .invalid {
      box-shadow: inset 0 0 0 2px var(--coral);
    }

    .tabs {
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid var(--line);
      background: #fbfcfb;
      overflow-x: auto;
    }

    .result-body {
      min-height: 540px;
      padding: 16px;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfb;
      min-height: 76px;
    }

    .stat-label {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 760;
      color: var(--ink);
      line-height: 1.1;
    }

    .level-list {
      display: grid;
      gap: 10px;
    }

    .level {
      display: grid;
      grid-template-columns: 78px 1fr;
      gap: 12px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #fbfcfb;
    }

    .level-index {
      color: var(--teal);
      font-weight: 760;
      font-size: 14px;
    }

    .chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      padding: 0 10px;
      border-radius: 999px;
      background: var(--teal-soft);
      color: #16443f;
      font-size: 13px;
      font-weight: 650;
    }

    .power-table th,
    .power-table td,
    .reach-table th,
    .reach-table td,
    .process-table th,
    .process-table td {
      height: 42px;
      min-width: 92px;
      padding: 0 8px;
    }

    .section-title {
      margin: 18px 0 10px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 760;
    }

    .process-grid {
      display: grid;
      gap: 14px;
    }

    .process-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      overflow: hidden;
    }

    .process-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
    }

    .process-head strong {
      font-size: 14px;
    }

    .process-head span {
      color: var(--muted);
      font-size: 12px;
      text-align: right;
    }

    .matrix-mini {
      overflow: auto;
    }

    .bar {
      height: 8px;
      background: #e7ebe7;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar span {
      display: block;
      height: 100%;
      background: var(--blue);
      border-radius: inherit;
    }

    .graph-board {
      position: relative;
      min-height: 420px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfcfb;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 420px;
    }

    .report-box,
    .csv-input {
      width: 100%;
      min-height: 430px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      background: #fbfcfb;
      color: var(--ink);
      line-height: 1.55;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace;
      font-size: 13px;
      white-space: pre;
    }

    .csv-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 10px;
    }

    .notice {
      border-left: 4px solid var(--coral);
      background: #fff7f5;
      color: #74352d;
      padding: 10px 12px;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 13px;
      display: none;
    }

    .notice.show {
      display: block;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 980px) {
      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
        padding: 14px 0;
      }

      .toolbar {
        width: 100%;
        justify-content: flex-start;
      }

      .workspace {
        grid-template-columns: 1fr;
      }

      .matrix-wrap {
        max-height: none;
      }

      .stats-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .topbar-inner,
      .workspace {
        width: min(100vw - 20px, 1440px);
      }

      .threshold {
        grid-template-columns: 1fr;
        width: 100%;
        padding: 8px 10px;
      }

      .toolbar button:not(.icon),
      .toolbar label button {
        flex: 1 1 120px;
      }

      .panel-head {
        align-items: flex-start;
        flex-direction: column;
      }

      .panel-actions {
        justify-content: flex-start;
      }

      .setup-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">矩</div>
            <div>
              <h1 class="lab-name">辽宁省大数据管理与优化决策重点实验室</h1>
              <div class="brand-caption">任务关系矩阵分析工具</div>
            </div>
          </div>
        </div>
        <div class="toolbar" aria-label="全局操作">
          <label class="threshold">
            <span>阈值</span>
            <input id="threshold" type="range" min="0" max="1" step="0.01" value="0.6">
            <strong id="thresholdValue">0.60</strong>
          </label>
          <button id="resetBtn" title="恢复示例">↺ 示例</button>
          <button id="exportCsvBtn" title="导出当前矩阵为 CSV">↓ CSV</button>
          <button id="exportReportBtn" class="primary" title="导出当前分析报告">↓ 报告</button>
        </div>
      </div>
    </header>

    <main class="workspace">
      <section class="panel" aria-labelledby="matrixTitle">
        <div class="panel-head">
          <div class="panel-title">
            <h2 id="matrixTitle">关系矩阵</h2>
            <span id="matrixMeta" class="meta"></span>
          </div>
          <div class="panel-actions">
            <button id="addBtn" class="icon" title="增加元素">+</button>
            <button id="removeBtn" class="icon" title="删除最后一个元素">−</button>
            <input id="fileInput" class="hidden" type="file" accept=".csv,text/csv">
            <button id="importBtn" title="导入 CSV">↑ CSV</button>
          </div>
        </div>
        <div id="matrixError" class="notice"></div>
        <div class="setup" aria-label="任务设置">
          <div class="setup-row">
            <label for="taskCount">行列数</label>
            <input id="taskCount" class="size-input" type="number" min="1" max="20" step="1" value="5">
            <span class="meta">使用同一组任务生成方阵</span>
          </div>
          <div id="taskList" class="task-list"></div>
        </div>
        <div class="matrix-wrap">
          <table id="matrixTable" class="matrix-table" aria-label="可编辑关系矩阵"></table>
        </div>
      </section>

      <section class="panel" aria-labelledby="resultTitle">
        <div class="panel-head">
          <div class="panel-title">
            <h2 id="resultTitle">分析结果</h2>
            <span id="resultMeta" class="meta"></span>
          </div>
        </div>
        <div class="tabs" role="tablist" aria-label="结果视图">
          <button class="tab" data-tab="overview" role="tab" aria-selected="true">层级</button>
          <button class="tab" data-tab="graph" role="tab" aria-selected="false">图</button>
          <button class="tab" data-tab="reachability" role="tab" aria-selected="false">可达矩阵</button>
          <button class="tab" data-tab="process" role="tab" aria-selected="false">过程</button>
          <button class="tab" data-tab="csv" role="tab" aria-selected="false">CSV</button>
          <button class="tab" data-tab="report" role="tab" aria-selected="false">报告</button>
        </div>
        <div class="result-body">
          <div id="resultError" class="notice"></div>
          <div id="tab-overview"></div>
          <div id="tab-graph" class="hidden">
            <div class="graph-board">
              <canvas id="graphCanvas" width="960" height="620" aria-label="ISM 层级关系图"></canvas>
            </div>
          </div>
          <div id="tab-reachability" class="hidden"></div>
          <div id="tab-process" class="hidden"></div>
          <div id="tab-csv" class="hidden">
            <textarea id="csvInput" class="csv-input" spellcheck="false"></textarea>
            <div class="csv-actions">
              <button id="applyCsvBtn" class="primary">应用 CSV</button>
            </div>
          </div>
          <div id="tab-report" class="hidden">
            <textarea id="reportBox" class="report-box" readonly spellcheck="false"></textarea>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script>
    const sampleLabels = ["任务1", "任务2", "任务3", "任务4", "任务5"];
    const sampleMatrix = [
      [0, 0.8, 0, 0, 0],
      [0, 0, 0.7, 0.9, 0],
      [0, 0, 0, 0.6, 0],
      [0, 0, 0, 0, 0.8],
      [0, 0, 0, 0, 0],
    ];

    let labels = [...sampleLabels];
    let matrix = cloneMatrix(sampleMatrix);
    let threshold = 0.6;
    let activeTab = "overview";
    let lastResult = null;

    const $ = (id) => document.getElementById(id);

    function cloneMatrix(source) {
      return source.map((row) => row.slice());
    }

    function clamp01(value) {
      const number = Number(value);
      if (!Number.isFinite(number)) return NaN;
      return Math.min(1, Math.max(0, number));
    }

    function fmt(value) {
      if (!Number.isFinite(value)) return "";
      if (Math.abs(value - Math.round(value)) < 1e-9) return String(Math.round(value));
      return value.toFixed(3).replace(/0+$/, "").replace(/\.$/, "");
    }

    function countPositive(values, includeDiagonal = false) {
      return values.reduce((total, row, rowIndex) =>
        total + row.reduce((rowTotal, value, colIndex) => {
          if (!includeDiagonal && rowIndex === colIndex) return rowTotal;
          return rowTotal + (value > 0 ? 1 : 0);
        }, 0), 0);
    }

    function strongestDirectRelation(result) {
      let strongest = null;
      result.matrix.forEach((row, rowIndex) => {
        row.forEach((value, colIndex) => {
          if (rowIndex === colIndex || value <= 0) return;
          if (!strongest || value > strongest.value) {
            strongest = {
              source: result.labels[rowIndex],
              target: result.labels[colIndex],
              value,
            };
          }
        });
      });
      return strongest;
    }

    function validateMatrix() {
      if (!labels.length) throw new Error("至少需要一个元素。");
      if (new Set(labels).size !== labels.length) throw new Error("元素名称不能重复。");
      labels.forEach((label, index) => {
        if (!label.trim()) throw new Error(`第 ${index + 1} 个元素名称为空。`);
      });
      matrix.forEach((row, rowIndex) => {
        if (row.length !== labels.length) throw new Error(`第 ${rowIndex + 1} 行长度不正确。`);
        row.forEach((value, colIndex) => {
          if (!Number.isFinite(value) || value < 0 || value > 1) {
            throw new Error(`${labels[rowIndex]} → ${labels[colIndex]} 的关系强度必须在 0 到 1 之间。`);
          }
        });
      });
    }

    function transitiveClosure(input) {
      const closure = cloneMatrix(input);
      for (let i = 0; i < closure.length; i += 1) {
        closure[i][i] = 1;
      }
      const steps = [{
        title: "M0 自可达矩阵",
        note: "在原始矩阵对角线加入 1，表示每个任务可达自身。",
        matrix: cloneMatrix(closure),
        changed: closure.length,
      }];
      for (let via = 0; via < closure.length; via += 1) {
        let changed = 0;
        for (let source = 0; source < closure.length; source += 1) {
          if (closure[source][via] === 0) continue;
          for (let target = 0; target < closure.length; target += 1) {
            const pathStrength = Math.min(closure[source][via], closure[via][target]);
            if (pathStrength > closure[source][target]) {
              closure[source][target] = pathStrength;
              changed += 1;
            }
          }
        }
        steps.push({
          title: `M${via + 1} 经由 ${labels[via]}`,
          note: changed ? `本轮更新 ${changed} 个可达强度。` : "本轮没有新增或增强的可达关系。",
          matrix: cloneMatrix(closure),
          changed,
        });
      }
      return { closure, steps };
    }

    function deriveLevels(reachability) {
      const remaining = new Set(labels.map((_, index) => index));
      const levels = [];
      while (remaining.size) {
        const current = [];
        [...remaining].sort((a, b) => a - b).forEach((item) => {
          const reachable = [...remaining].filter((idx) => reachability[item][idx] >= threshold);
          const antecedent = new Set([...remaining].filter((idx) => reachability[idx][item] >= threshold));
          if (reachable.every((idx) => antecedent.has(idx))) current.push(item);
        });
        if (!current.length) {
          throw new Error("无法完成层级划分，请调低阈值或检查是否存在强循环关系。");
        }
        levels.push(current.map((idx) => labels[idx]));
        current.forEach((idx) => remaining.delete(idx));
      }
      return levels;
    }

    function analyze() {
      validateMatrix();
      const closureResult = transitiveClosure(matrix);
      const reachability = closureResult.closure;
      const levels = deriveLevels(reachability);
      const driving = reachability.map((row) => row.reduce((sum, value) => sum + value, 0));
      const dependence = labels.map((_, column) =>
        reachability.reduce((sum, row) => sum + row[column], 0)
      );
      const processMatrices = [
        {
          title: "A 原始关系矩阵",
          note: "用户输入的任务间直接影响强度。",
          matrix: cloneMatrix(matrix),
          changed: countPositive(matrix),
        },
        ...closureResult.steps,
        {
          title: "R 最终可达矩阵",
          note: "max-min 闭包完成后的直接与间接可达强度。",
          matrix: cloneMatrix(reachability),
          changed: countPositive(reachability),
        },
      ];
      return { labels: [...labels], matrix: cloneMatrix(matrix), reachability, levels, driving, dependence, threshold, processMatrices };
    }

    function renderMatrix() {
      $("matrixMeta").textContent = `${labels.length} × ${labels.length}`;
      const table = $("matrixTable");
      const header = labels.map((label, index) => `
        <th>
          <span class="label-display" data-label-display="${index}" title="${escapeHtml(label)}">${escapeHtml(label)}</span>
        </th>
      `).join("");
      const rows = matrix.map((row, rowIndex) => `
        <tr>
          <td class="row-label">
            <span class="label-display" data-label-display="${rowIndex}" title="${escapeHtml(labels[rowIndex])}">${escapeHtml(labels[rowIndex])}</span>
          </td>
          ${row.map((value, colIndex) => {
            if (rowIndex === colIndex) {
              return `<td class="diagonal">0</td>`;
            }
            const intensity = Math.round(value * 100);
            const background = `rgba(15, 118, 110, ${0.08 + value * 0.42})`;
            return `
              <td style="background:${background}">
                <input class="cell" type="number" min="0" max="1" step="0.01"
                  aria-label="${escapeHtml(labels[rowIndex])} 到 ${escapeHtml(labels[colIndex])}"
                  data-row="${rowIndex}" data-col="${colIndex}" value="${fmt(value)}"
                  style="font-weight:${value >= threshold ? 760 : 520}; color:${intensity >= 70 ? "#0f332f" : "#17212b"}">
              </td>
            `;
          }).join("")}
        </tr>
      `).join("");
      table.innerHTML = `<thead><tr><th class="corner"></th>${header}</tr></thead><tbody>${rows}</tbody>`;
    }

    function renderAll() {
      renderTaskList();
      renderMatrix();
      $("taskCount").value = String(labels.length);
      $("threshold").value = String(threshold);
      $("thresholdValue").textContent = threshold.toFixed(2);
      renderResults();
      setActiveTab(activeTab);
    }

    function renderTaskList() {
      $("taskList").innerHTML = labels.map((label, index) => `
        <label class="task-field">
          <span class="task-index">${index + 1}</span>
          <input data-task-index="${index}" value="${escapeHtml(label)}" aria-label="任务 ${index + 1} 名称">
        </label>
      `).join("");
    }

    function setTaskCount(count) {
      const nextCount = Math.max(1, Math.min(20, Math.trunc(count || 1)));
      const oldLabels = labels.slice();
      const oldMatrix = cloneMatrix(matrix);
      labels = Array.from({ length: nextCount }, (_, index) => oldLabels[index] || `任务${index + 1}`);
      matrix = Array.from({ length: nextCount }, (_, row) =>
        Array.from({ length: nextCount }, (_, col) => {
          if (row === col) return 0;
          return oldMatrix[row]?.[col] ?? 0;
        })
      );
      renderAll();
    }

    function updateTaskLabel(index, value) {
      labels[index] = value.trim();
      document.querySelectorAll(`[data-label-display="${index}"]`).forEach((node) => {
        node.textContent = labels[index];
        node.title = labels[index];
      });
      renderResults();
    }

    function renderResults() {
      try {
        lastResult = analyze();
        $("matrixError").classList.remove("show");
        $("resultError").classList.remove("show");
        $("resultMeta").textContent = `阈值 ${threshold.toFixed(2)}`;
        renderOverview(lastResult);
        renderReachability(lastResult);
        renderProcess(lastResult);
        renderCsv();
        renderReport(lastResult);
        renderGraph(lastResult);
      } catch (error) {
        lastResult = null;
        showError("resultError", error.message);
      }
      if (activeTab === "graph" && lastResult) renderGraph(lastResult);
    }

    function renderOverview(result) {
      const maxDriving = Math.max(...result.driving, 1);
      const maxDependence = Math.max(...result.dependence, 1);
      const top = result.levels[0] || [];
      const bottom = result.levels[result.levels.length - 1] || [];
      const strongest = result.labels
        .map((label, index) => ({ label, value: result.driving[index] }))
        .sort((a, b) => b.value - a.value)[0];
      const directEdges = countPositive(result.matrix);
      const reachableEdges = countPositive(result.reachability);
      const closureGain = Math.max(0, reachableEdges - directEdges);
      const strongRelation = strongestDirectRelation(result);
      $("tab-overview").innerHTML = `
        <div class="stats-grid">
          <div class="stat"><div class="stat-label">任务数量</div><div class="stat-value">${result.labels.length}</div></div>
          <div class="stat"><div class="stat-label">直接关系</div><div class="stat-value">${directEdges}</div></div>
          <div class="stat"><div class="stat-label">闭包新增</div><div class="stat-value">${closureGain}</div></div>
          <div class="stat"><div class="stat-label">顶层因素</div><div class="stat-value">${escapeHtml(top.join("、"))}</div></div>
          <div class="stat"><div class="stat-label">底层因素</div><div class="stat-value">${escapeHtml(bottom.join("、"))}</div></div>
          <div class="stat"><div class="stat-label">最强驱动</div><div class="stat-value">${escapeHtml(strongest.label)}</div></div>
        </div>
        <div class="level" style="margin-bottom:14px">
          <div class="level-index">最强关系</div>
          <div class="chips">
            <span class="chip">${strongRelation ? `${escapeHtml(strongRelation.source)} → ${escapeHtml(strongRelation.target)}：${fmt(strongRelation.value)}` : "暂无直接关系"}</span>
            <span class="chip">阈值：${fmt(result.threshold)}</span>
            <span class="chip">过程矩阵：${result.processMatrices.length} 个</span>
          </div>
        </div>
        <div class="level-list">
          ${result.levels.map((level, index) => `
            <div class="level">
              <div class="level-index">第 ${index + 1} 层</div>
              <div class="chips">${level.map((item) => `<span class="chip">${escapeHtml(item)}</span>`).join("")}</div>
            </div>
          `).join("")}
        </div>
        <div style="height:16px"></div>
        <table class="power-table">
          <thead><tr><th>元素</th><th>驱动力</th><th></th><th>依赖力</th><th></th></tr></thead>
          <tbody>
            ${result.labels.map((label, index) => `
              <tr>
                <td>${escapeHtml(label)}</td>
                <td>${fmt(result.driving[index])}</td>
                <td><div class="bar"><span style="width:${(result.driving[index] / maxDriving) * 100}%"></span></div></td>
                <td>${fmt(result.dependence[index])}</td>
                <td><div class="bar"><span style="width:${(result.dependence[index] / maxDependence) * 100}%; background:var(--amber)"></span></div></td>
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderReachability(result) {
      $("tab-reachability").innerHTML = `
        <div class="matrix-wrap">
          ${matrixTableHtml(result.labels, result.reachability, "reach-table", "blue")}
        </div>
      `;
    }

    function renderProcess(result) {
      $("tab-process").innerHTML = `
        <div class="process-grid">
          ${result.processMatrices.map((item, index) => `
            <section class="process-card">
              <div class="process-head">
                <strong>${escapeHtml(item.title)}</strong>
                <span>${escapeHtml(item.note)}${index > 1 && index < result.processMatrices.length - 1 ? ` · 变化 ${item.changed}` : ""}</span>
              </div>
              <div class="matrix-mini">
                ${matrixTableHtml(result.labels, item.matrix, "process-table", index === 0 ? "teal" : "blue")}
              </div>
            </section>
          `).join("")}
        </div>
      `;
    }

    function matrixTableHtml(tableLabels, values, className, tone) {
      return `
        <table class="${className}">
          <thead><tr><th></th>${tableLabels.map((label) => `<th>${escapeHtml(label)}</th>`).join("")}</tr></thead>
          <tbody>
            ${values.map((row, rowIndex) => `
              <tr>
                <th>${escapeHtml(tableLabels[rowIndex])}</th>
                ${row.map((value) => {
                  const color = tone === "teal" ? "15, 118, 110" : "47, 95, 152";
                  const background = `rgba(${color}, ${0.05 + value * 0.35})`;
                  return `<td style="background:${background}; font-weight:${value >= threshold ? 760 : 520}">${fmt(value)}</td>`;
                }).join("")}
              </tr>
            `).join("")}
          </tbody>
        </table>
      `;
    }

    function renderCsv() {
      $("csvInput").value = toCsv(labels, matrix);
    }

    function renderReport(result) {
      $("reportBox").value = buildReport(result);
    }

    function renderGraph(result) {
      const canvas = $("graphCanvas");
      const ctx = canvas.getContext("2d");
      const width = canvas.width;
      const height = canvas.height;
      ctx.clearRect(0, 0, width, height);
      ctx.fillStyle = "#fbfcfb";
      ctx.fillRect(0, 0, width, height);

      const levelGap = height / (result.levels.length + 1);
      const positions = new Map();
      result.levels.forEach((level, levelIndex) => {
        const y = levelGap * (levelIndex + 1);
        const xGap = width / (level.length + 1);
        level.forEach((label, itemIndex) => {
          positions.set(label, { x: xGap * (itemIndex + 1), y });
        });
      });

      result.labels.forEach((source, sourceIndex) => {
        result.labels.forEach((target, targetIndex) => {
          const strength = result.matrix[sourceIndex][targetIndex];
          if (sourceIndex === targetIndex || strength < result.threshold) return;
          const a = positions.get(source);
          const b = positions.get(target);
          if (!a || !b) return;
          drawArrow(ctx, a.x, a.y, b.x, b.y, strength);
        });
      });

      result.levels.forEach((level, levelIndex) => {
        const y = levelGap * (levelIndex + 1);
        ctx.fillStyle = "#eef3f0";
        ctx.fillRect(0, y - 1, width, 2);
        ctx.fillStyle = "#5b6672";
        ctx.font = "14px system-ui, sans-serif";
        ctx.fillText(`L${levelIndex + 1}`, 18, y - 12);
      });

      result.labels.forEach((label) => {
        const point = positions.get(label);
        drawNode(ctx, point.x, point.y, label);
      });
    }

    function drawArrow(ctx, x1, y1, x2, y2, strength) {
      const angle = Math.atan2(y2 - y1, x2 - x1);
      const startOffset = 44;
      const endOffset = 48;
      const sx = x1 + Math.cos(angle) * startOffset;
      const sy = y1 + Math.sin(angle) * startOffset;
      const ex = x2 - Math.cos(angle) * endOffset;
      const ey = y2 - Math.sin(angle) * endOffset;
      ctx.save();
      ctx.strokeStyle = strength >= 0.75 ? "#0f766e" : "#7a8791";
      ctx.fillStyle = ctx.strokeStyle;
      ctx.lineWidth = 1.5 + strength * 2.2;
      ctx.globalAlpha = 0.5 + strength * 0.45;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(ex, ey);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(ex, ey);
      ctx.lineTo(ex - Math.cos(angle - Math.PI / 6) * 12, ey - Math.sin(angle - Math.PI / 6) * 12);
      ctx.lineTo(ex - Math.cos(angle + Math.PI / 6) * 12, ey - Math.sin(angle + Math.PI / 6) * 12);
      ctx.closePath();
      ctx.fill();
      ctx.globalAlpha = 1;
      const mx = (sx + ex) / 2;
      const my = (sy + ey) / 2;
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "#cfd8d3";
      roundRect(ctx, mx - 18, my - 12, 36, 24, 6);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#17212b";
      ctx.font = "13px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(fmt(strength), mx, my);
      ctx.restore();
    }

    function drawNode(ctx, x, y, label) {
      const width = Math.max(86, Math.min(150, label.length * 18 + 34));
      const height = 42;
      ctx.save();
      ctx.fillStyle = "#ffffff";
      ctx.strokeStyle = "#0f766e";
      ctx.lineWidth = 1.5;
      roundRect(ctx, x - width / 2, y - height / 2, width, height, 8);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = "#17212b";
      ctx.font = "700 15px system-ui, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillText(label, x, y);
      ctx.restore();
    }

    function roundRect(ctx, x, y, width, height, radius) {
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + width, y, x + width, y + height, radius);
      ctx.arcTo(x + width, y + height, x, y + height, radius);
      ctx.arcTo(x, y + height, x, y, radius);
      ctx.arcTo(x, y, x + width, y, radius);
      ctx.closePath();
    }

    function buildReport(result) {
      const lines = [
        "DSM/ISM 分析报告",
        "=======================",
        "",
        "系统元素：",
        result.labels.join(", "),
        "",
        "原始关系矩阵：",
        matrixText(result.labels, result.matrix),
        "",
        "过程矩阵：",
        ...result.processMatrices.flatMap((item) => [
          item.title,
          item.note,
          matrixText(result.labels, item.matrix),
          "",
        ]),
        "可达矩阵：",
        matrixText(result.labels, result.reachability),
        "",
        "ISM 层级划分（先显示顶层/结果层）：",
        `层级阈值：${fmt(result.threshold)}`,
        ...result.levels.map((level, index) => `第 ${index + 1} 层：${level.join(", ")}`),
        "",
        "驱动力与依赖力：",
        ...result.labels.map((label, index) => `- ${label}：驱动力 = ${fmt(result.driving[index])}，依赖力 = ${fmt(result.dependence[index])}`),
        "",
        "结果解释：",
        `- 顶层/结果因素：${(result.levels[0] || []).join(", ")}`,
        `- 底层/驱动因素：${(result.levels[result.levels.length - 1] || []).join(", ")}`,
        "- 连续矩阵使用 max-min 可达闭包：路径强度取最弱环节，多条路径取最强路径。",
      ];
      return lines.join("\n");
    }

    function matrixText(headers, values) {
      const width = Math.max(6, ...headers.map((label) => label.length + 2));
      const head = " ".repeat(width + 1) + headers.map((label) => label.padStart(width)).join(" ");
      const rows = values.map((row, index) =>
        headers[index].padStart(width) + " " + row.map((value) => fmt(value).padStart(width)).join(" ")
      );
      return [head, ...rows].join("\n");
    }

    function toCsv(csvLabels, csvMatrix) {
      const escape = (value) => {
        const text = String(value);
        return /[",\n]/.test(text) ? `"${text.replace(/"/g, '""')}"` : text;
      };
      return [
        ["", ...csvLabels].map(escape).join(","),
        ...csvMatrix.map((row, index) => [csvLabels[index], ...row.map(fmt)].map(escape).join(",")),
      ].join("\n");
    }

    function parseCsv(text) {
      const rows = [];
      let row = [];
      let cell = "";
      let quoted = false;
      for (let i = 0; i < text.length; i += 1) {
        const char = text[i];
        const next = text[i + 1];
        if (quoted) {
          if (char === '"' && next === '"') {
            cell += '"';
            i += 1;
          } else if (char === '"') {
            quoted = false;
          } else {
            cell += char;
          }
        } else if (char === '"') {
          quoted = true;
        } else if (char === ",") {
          row.push(cell.trim());
          cell = "";
        } else if (char === "\n") {
          row.push(cell.trim());
          rows.push(row);
          row = [];
          cell = "";
        } else if (char !== "\r") {
          cell += char;
        }
      }
      row.push(cell.trim());
      if (row.some(Boolean)) rows.push(row);
      if (rows.length < 2) throw new Error("CSV 至少需要表头和一行矩阵。");
      const parsedLabels = rows[0].slice(1).map((item) => item.trim());
      const parsedRows = rows.slice(1).filter((item) => item.length > 1);
      const rowLabels = parsedRows.map((item) => item[0].trim());
      if (parsedLabels.length !== rowLabels.length) throw new Error("CSV 行列数量不一致。");
      if (parsedLabels.some((label) => !label)) throw new Error("CSV 表头包含空名称。");
      if (parsedLabels.join("\u0000") !== rowLabels.join("\u0000")) {
        throw new Error("CSV 行标签必须和列标签顺序一致。");
      }
      const parsedMatrix = parsedRows.map((csvRow) => csvRow.slice(1).map((value) => Number(value)));
      labels = parsedLabels;
      matrix = parsedMatrix;
      validateMatrix();
    }

    function addElement() {
      const next = `元素${labels.length + 1}`;
      labels.push(next);
      matrix.forEach((row) => row.push(0));
      matrix.push(labels.map(() => 0));
      renderAll();
    }

    function removeElement() {
      if (labels.length <= 1) return;
      labels.pop();
      matrix.pop();
      matrix.forEach((row) => row.pop());
      renderAll();
    }

    function resetSample() {
      labels = [...sampleLabels];
      matrix = cloneMatrix(sampleMatrix);
      threshold = 0.6;
      renderAll();
    }

    function download(name, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = name;
      document.body.append(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
    }

    function showError(id, message) {
      const el = $(id);
      el.textContent = message;
      el.classList.add("show");
    }

    function setActiveTab(tab) {
      activeTab = tab;
      document.querySelectorAll(".tab").forEach((button) => {
        button.setAttribute("aria-selected", String(button.dataset.tab === tab));
      });
      ["overview", "graph", "reachability", "process", "csv", "report"].forEach((name) => {
        $(`tab-${name}`).classList.toggle("hidden", name !== tab);
      });
      if (tab === "graph" && lastResult) renderGraph(lastResult);
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    $("threshold").addEventListener("input", (event) => {
      threshold = Number(event.target.value);
      renderAll();
    });

    $("taskCount").addEventListener("change", (event) => {
      setTaskCount(Number(event.target.value));
    });

    $("taskCount").addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        setTaskCount(Number(event.currentTarget.value));
      }
    });

    $("taskList").addEventListener("input", (event) => {
      const target = event.target;
      if (target.dataset.taskIndex === undefined) return;
      updateTaskLabel(Number(target.dataset.taskIndex), target.value);
    });

    $("matrixTable").addEventListener("input", (event) => {
      const target = event.target;
      if (target.dataset.row !== undefined) {
        const row = Number(target.dataset.row);
        const col = Number(target.dataset.col);
        const value = clamp01(target.value);
        target.classList.toggle("invalid", !Number.isFinite(value));
        if (Number.isFinite(value)) {
          matrix[row][col] = value;
          const intensity = Math.round(value * 100);
          target.parentElement.style.background = `rgba(15, 118, 110, ${0.08 + value * 0.42})`;
          target.style.fontWeight = value >= threshold ? "760" : "520";
          target.style.color = intensity >= 70 ? "#0f332f" : "#17212b";
          renderResults();
        }
      }
    });

    document.querySelectorAll(".tab").forEach((button) => {
      button.addEventListener("click", () => setActiveTab(button.dataset.tab));
    });

    $("addBtn").addEventListener("click", addElement);
    $("removeBtn").addEventListener("click", removeElement);
    $("resetBtn").addEventListener("click", resetSample);
    $("exportCsvBtn").addEventListener("click", () => download("dsm_matrix.csv", toCsv(labels, matrix), "text/csv;charset=utf-8"));
    $("exportReportBtn").addEventListener("click", () => {
      if (lastResult) download("dsm_ism_report.txt", buildReport(lastResult), "text/plain;charset=utf-8");
    });
    $("importBtn").addEventListener("click", () => $("fileInput").click());
    $("fileInput").addEventListener("change", async (event) => {
      const file = event.target.files[0];
      if (!file) return;
      try {
        parseCsv(await file.text());
        renderAll();
      } catch (error) {
        showError("matrixError", error.message);
      } finally {
        event.target.value = "";
      }
    });
    $("applyCsvBtn").addEventListener("click", () => {
      try {
        parseCsv($("csvInput").value);
        renderAll();
        setActiveTab("overview");
      } catch (error) {
        showError("resultError", error.message);
      }
    });

    renderAll();
  </script>
</body>
</html>
